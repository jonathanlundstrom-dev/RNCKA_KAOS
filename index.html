<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NCRAM Pipeline</title>

  <!-- Add-to-Home-Screen (iOS) -->
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="RAM" />
  <meta name="theme-color" content="#0B2545" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:#0B2545; --gold:#C7A24B; --ink:#1a2432; --muted:#6b7686;
      --line:#e4e8ee; --bg:#f4f6f9; --card:#ffffff; --radius:14px; --red:#D64545;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"DM Sans",system-ui,sans-serif; color:var(--ink);
           background:var(--bg); -webkit-font-smoothing:antialiased; }

    .topbar { position:sticky; top:0; z-index:20; background:#fff; border-bottom:1px solid var(--line);
              display:flex; align-items:center; justify-content:space-between; padding:14px 18px; }
    .brand { font-size:0.95rem; font-weight:700; letter-spacing:0.06em; color:var(--navy); }
    .role-pill { font-size:0.64rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em;
                 padding:4px 9px; border-radius:999px; }
    .role-pill.mgr { background:var(--gold); color:#2a2008; }
    .role-pill.rep { background:#eef1f6; color:var(--navy); }

    /* Bottom navigation */
    .bottomnav { position:fixed; left:0; right:0; bottom:0; z-index:30; background:#fff;
                 border-top:1px solid var(--line); display:flex; justify-content:space-around;
                 padding:8px 6px calc(8px + env(safe-area-inset-bottom));
                 box-shadow:0 -2px 12px rgba(11,37,69,0.05); }
    .navitem { background:none; border:none; cursor:pointer; font-family:inherit; flex:1;
               display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted); padding:4px 3px; }
    .navitem.active { color:var(--navy); }
    .navicon svg { width:22px; height:22px; display:block; }
    .navlabel { font-size:0.57rem; font-weight:600; white-space:nowrap; }

    /* One-time "Add to Home Screen" hint */
    .a2hs { position:fixed; left:16px; right:16px; bottom:calc(82px + env(safe-area-inset-bottom));
            max-width:360px; margin:0 auto; z-index:60; background:var(--navy); color:#fff;
            border-radius:14px; box-shadow:0 12px 32px rgba(11,37,69,0.38); padding:14px 16px;
            transform:translateY(16px); opacity:0; transition:transform .28s ease, opacity .28s ease; }
    .a2hs.show { transform:translateY(0); opacity:1; }
    .a2hs-body { display:flex; align-items:center; gap:12px; }
    .a2hs-icon { width:44px; height:44px; border-radius:11px; flex:none; }
    .a2hs-text { font-size:0.84rem; line-height:1.4; display:flex; flex-direction:column; gap:2px; }
    .a2hs-text b { font-weight:700; }
    .a2hs-share { width:15px; height:15px; vertical-align:-3px; color:#9fc0ff; }
    .a2hs-x { position:absolute; top:6px; right:9px; background:none; border:none; color:rgba(255,255,255,0.65);
              font-size:1.35rem; line-height:1; cursor:pointer; padding:2px 5px; }
    .a2hs-arrow { position:absolute; bottom:-7px; left:50%; transform:translateX(-50%) rotate(45deg);
                  width:15px; height:15px; background:var(--navy); border-radius:3px; }

    /* Landing / profile */
    .profile-cover { height:96px; border-radius:var(--radius) var(--radius) 0 0;
                     background:linear-gradient(135deg, var(--navy), #1d4e86); }
    .profile-card { background:#fff; border:1px solid var(--line); border-top:none;
                    border-radius:0 0 var(--radius) var(--radius); padding:0 18px 20px;
                    text-align:center; margin-bottom:18px; }
    .avatar-wrap { margin-top:-44px; display:inline-block; position:relative; }
    .avatar { width:88px; height:88px; border-radius:50%; border:4px solid #fff; cursor:pointer;
              background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center;
              font-size:1.7rem; font-weight:600; overflow:hidden; }
    .avatar img { width:100%; height:100%; object-fit:cover; }
    .avatar-edit { position:absolute; right:0; bottom:4px; width:28px; height:28px; border-radius:50%;
                   background:var(--gold); color:#2a2008; border:2px solid #fff; cursor:pointer;
                   display:flex; align-items:center; justify-content:center; }
    .profile-name { margin:10px 0 2px; font-size:1.3rem; font-weight:700; }
    .profile-role { font-size:0.85rem; color:var(--muted); }
    .demo-switch { margin-top:14px; font-size:0.72rem; color:var(--muted); }
    .demo-switch select { font-family:inherit; font-size:0.8rem; padding:7px 10px; border:1px solid var(--line);
                          border-radius:9px; background:#fff; color:var(--ink); margin-left:6px; }

    .section-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.07em;
                     color:var(--muted); font-weight:700; margin:6px 2px 10px; }
    .tiles { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px; }
    .tile { background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:16px 8px; text-align:center; }
    .tile-num { font-family:"DM Mono",monospace; font-size:1.5rem; font-weight:500; color:var(--navy); }
    .tile-num.alert { color:var(--red); }
    .tile-lbl { font-size:0.64rem; text-transform:uppercase; letter-spacing:0.04em; color:var(--muted); margin-top:5px; }
    .quick { display:flex; gap:10px; margin-bottom:18px; }
    .quick .btn { flex:1; }
    .rings { display:flex; gap:10px; justify-content:space-around; background:#fff;
             border:1px solid var(--line); border-radius:var(--radius); padding:18px 10px; margin-bottom:8px; }
    .ring { text-align:center; }
    .ring svg { width:84px; height:84px; }
    .ring-pct { font-family:"DM Mono",monospace; font-size:0.95rem; font-weight:500; fill:var(--ink); }
    .ring-label { font-size:0.72rem; color:var(--muted); margin-top:4px; }

    .wrap { padding:16px 16px 92px; max-width:1100px; margin:0 auto; }
    .toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .toolbar-title { margin:0; font-size:1rem; font-weight:600; }

    /* Search + filters */
    .search { width:100%; font-family:inherit; font-size:0.95rem; padding:11px 12px;
              border:1px solid var(--line); border-radius:10px; background:#fff; margin-bottom:10px; }
    .filters { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .filt { font-family:inherit; font-size:0.82rem; padding:8px 10px; border:1px solid var(--line);
            border-radius:9px; background:#fff; color:var(--ink); }
    .count { font-size:0.76rem; color:var(--muted); margin:0; }

    /* Results header with view toggle */
    .results-head { display:flex; align-items:center; justify-content:space-between; margin:0 0 12px; gap:10px; }
    .viewtoggle { display:inline-flex; background:#eef1f5; border:1px solid var(--line); border-radius:9px; padding:2px; flex:none; }
    .vt { display:inline-flex; align-items:center; gap:5px; font-family:inherit; font-size:0.74rem; font-weight:600;
          color:var(--muted); background:none; border:none; border-radius:7px; padding:5px 10px; cursor:pointer; }
    .vt svg { opacity:0.8; }
    .vt.on { background:#fff; color:var(--navy); box-shadow:0 1px 3px rgba(11,37,69,0.12); }

    .list { display:grid; grid-template-columns:1fr; gap:12px; }
    @media (min-width:720px) { .list { grid-template-columns:1fr 1fr; } }

    /* List (row) view */
    .rows { display:flex; flex-direction:column; background:#fff; border:1px solid var(--line);
            border-radius:var(--radius); overflow:hidden; }
    .lrow { display:flex; align-items:center; gap:12px; padding:13px 14px; border-bottom:1px solid var(--line);
            cursor:pointer; background:#fff; }
    .lrow:last-child { border-bottom:none; }
    .lrow:active { background:#f4f6f9; }
    .lrow-dot { width:10px; height:10px; border-radius:50%; flex:none; }
    .lrow-main { flex:1; min-width:0; }
    .lrow-name { font-size:0.92rem; font-weight:600; color:var(--ink); display:flex; align-items:center; gap:7px;
                 white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lrow-sub { display:flex; align-items:center; gap:7px; margin-top:3px; min-width:0; }
    .lrow-meta { font-size:0.76rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lrow-sub .seg-pill { flex:none; font-size:0.66rem; padding:2px 8px; }
    .lrow.lost .lrow-name { text-decoration:line-through; color:var(--muted); }
    .lrow-side { flex:none; display:flex; align-items:center; }
    .lrow-chev { color:var(--muted); font-size:1.25rem; line-height:1; }
    .lrow-flag { width:7px; height:7px; border-radius:50%; background:var(--gold); flex:none; }

    .btn { font-family:inherit; font-size:0.85rem; font-weight:600; border-radius:10px;
           padding:10px 16px; border:1px solid transparent; cursor:pointer; }
    .btn-primary { background:var(--navy); color:#fff; }
    .btn-ghost { background:#fff; color:var(--navy); border-color:var(--line); }
    .btn-danger { background:#fff; color:#b3322a; border-color:#e6c4c4; }

    .card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
            padding:16px; cursor:pointer; transition:box-shadow .15s, transform .15s; }
    .card:hover { box-shadow:0 4px 14px rgba(11,37,69,0.08); transform:translateY(-1px); }
    .card.lost { opacity:0.62; }
    .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
    .card-name { margin:0; font-size:1.02rem; font-weight:600; letter-spacing:-0.01em; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .chip { font-size:0.72rem; font-weight:500; padding:3px 9px; border-radius:999px;
            background:#eef1f6; color:var(--muted); }
    .chip.fmc { background:#f3eede; color:#8a6d1f; }
    .chip.lost { background:#f0d9d9; color:#9b2c2c; font-weight:700; }
    .seg-pill { font-weight:600; }
    .owner { font-family:"DM Sans",sans-serif; font-size:0.76rem; font-weight:500; color:var(--muted);
             white-space:nowrap; text-align:right; line-height:1.4; }

    .stage { margin-top:14px; }
    .stage-label { display:flex; align-items:center; gap:7px; font-size:0.78rem;
                   font-weight:600; color:var(--ink); margin-bottom:6px; }
    .dot { width:9px; height:9px; border-radius:50%; flex:none; }
    .stage-bar { display:flex; gap:4px; }
    .seg { flex:1; height:6px; border-radius:3px; background:var(--line); }
    .nextstep { margin-top:12px; font-size:0.78rem; color:var(--navy); font-weight:500; }
    .nextstep.overdue { color:var(--red); font-weight:600; }

    .back { background:none; border:none; color:var(--navy); font-family:inherit;
            font-size:0.85rem; font-weight:600; cursor:pointer; padding:0; margin-bottom:14px; }
    .detail-name { margin:0 0 4px; font-size:1.3rem; font-weight:700; }
    .next-callout { margin-top:12px; padding:11px 14px; border-radius:10px; background:#eef3fb;
                    color:var(--navy); font-size:0.85rem; }
    .next-callout.overdue { background:#fdecec; color:var(--red); }
    .detail-rows { background:#fff; border:1px solid var(--line); border-radius:var(--radius);
                   margin-top:14px; overflow:hidden; }
    .row { display:flex; justify-content:space-between; gap:12px; padding:13px 16px;
           border-bottom:1px solid var(--line); font-size:0.9rem; }
    .row:last-child { border-bottom:none; }
    .row .k { color:var(--muted); }
    .row .v { font-weight:600; text-align:right; }
    .ownership-note { margin-top:14px; font-size:0.82rem; color:var(--muted); }

    /* Activity log */
    .note-add { display:flex; gap:8px; margin-top:10px; }
    .note-add input { flex:1; font-family:inherit; font-size:0.9rem; padding:10px 12px;
                      border:1px solid var(--line); border-radius:10px; }
    .activity { margin-top:12px; }
    .act { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--line); font-size:0.88rem; }
    .act:last-child { border-bottom:none; }
    .act-date { font-family:"DM Mono",monospace; font-size:0.74rem; color:var(--muted); white-space:nowrap; flex:none; }

    /* Call log items (richer than plain activity) */
    .act.call-log { flex-direction:column; gap:6px; }
    .call-log-top { display:flex; align-items:center; gap:8px; }
    .call-type { font-size:0.66rem; font-weight:700; letter-spacing:0.02em; text-transform:uppercase;
                 color:var(--navy); background:#eef2f8; border:1px solid #dce4ef; border-radius:999px; padding:2px 9px; }
    .call-note { color:var(--ink); }
    .exec-summary { display:flex; flex-direction:column; gap:3px; margin-top:2px;
                    border-left:2px solid var(--gold); padding-left:10px; }
    .exec-line { font-size:0.82rem; color:var(--muted); }
    .exec-tag { font-weight:700; color:var(--navy); margin-right:4px; }

    /* Call log form: execution blocks */
    .cp-log-sub { color:var(--muted); font-size:0.9rem; margin:-4px 0 14px; }
    .exec-block { margin-bottom:14px; }
    .exec-label { display:block; font-size:0.8rem; font-weight:600; color:var(--ink); margin-bottom:6px; }
    .exec-rows { display:flex; flex-direction:column; gap:6px; margin-bottom:8px; }
    .exec-row { display:flex; align-items:center; justify-content:space-between; gap:8px;
                background:#f7f8fa; border:1px solid var(--line); border-radius:9px; padding:8px 12px; font-size:0.86rem; }
    .exec-row-del { background:none; border:none; color:var(--muted); font-size:1.2rem; line-height:1; cursor:pointer; padding:0 2px; }
    .exec-add { display:flex; gap:8px; }
    .exec-add input, .exec-add select { font-family:inherit; font-size:0.9rem; padding:10px 12px;
                      border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--ink); }
    .exec-pick { flex:1; min-width:0; }
    .exec-qty { width:62px; flex:none; text-align:center; }
    .exec-addbtn { flex:none; white-space:nowrap; }
    .exec-check { display:flex; align-items:center; gap:9px; font-size:0.9rem; font-weight:600; color:var(--ink); cursor:pointer; }
    .exec-check input { width:17px; height:17px; }

    .team-region { background:#fff; border:1px solid var(--line); border-radius:var(--radius);
                   margin-bottom:12px; overflow:hidden; }
    .region-head { background:var(--navy); color:#fff; font-size:0.72rem; text-transform:uppercase;
                   letter-spacing:0.07em; font-weight:700; padding:9px 16px; }
    .rep-row { display:flex; justify-content:space-between; align-items:center; padding:13px 16px;
               border-bottom:1px solid var(--line); font-size:0.9rem; }
    .rep-row:last-child { border-bottom:none; }
    .rep-name { font-weight:600; }
    .rep-stats { font-family:"DM Mono",monospace; font-size:0.76rem; color:var(--muted); }

    .field { margin-bottom:14px; }
    .field label { display:block; font-size:0.78rem; font-weight:600; color:var(--ink); margin-bottom:5px; }
    .field input, .field select, .field textarea {
      width:100%; font-family:inherit; font-size:0.95rem; padding:11px 12px;
      border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--ink); }
    .field textarea { resize:vertical; line-height:1.45; }
    .form-section { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.07em;
                    color:var(--muted); font-weight:700; margin:22px 0 10px;
                    padding-bottom:6px; border-bottom:1px solid var(--line); }
    .form-section:first-of-type { margin-top:6px; }
    .grid-2 { display:grid; grid-template-columns:2fr 1fr; gap:10px; }
    .form-actions { display:flex; gap:10px; margin-top:20px; }
    .form-msg { color:var(--red); font-size:0.82rem; margin-bottom:10px; min-height:1em; }
    .danger-row { margin-top:24px; padding-top:16px; border-top:1px solid var(--line); }

    .photo-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .photo-thumb { position:relative; width:90px; height:90px; border-radius:10px;
                   overflow:hidden; border:1px solid var(--line); }
    .photo-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .photo-del { position:absolute; top:3px; right:3px; width:20px; height:20px; border:none;
                 border-radius:50%; background:rgba(0,0,0,0.55); color:#fff; font-size:14px;
                 line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .card-photos { display:flex; gap:5px; margin-top:12px; }
    .card-photos img { width:40px; height:40px; border-radius:6px; object-fit:cover; border:1px solid var(--line); }
    .card-photos .more { width:40px; height:40px; border-radius:6px; background:#eef1f6; color:var(--muted);
                         font-size:0.7rem; font-family:"DM Mono",monospace;
                         display:flex; align-items:center; justify-content:center; }
    .wins-summary { display:flex; gap:12px; margin-bottom:6px; }
    .ws-stat { flex:1; background:#fff; border:1px solid var(--line); border-radius:var(--radius);
               padding:16px; text-align:center; }
    .ws-num { font-family:"DM Mono",monospace; font-size:1.6rem; font-weight:500; color:#2E8B57; }
    .ws-lbl { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); margin-top:4px; }
    .alert-banner { margin:0 0 12px; padding:10px 14px; border-radius:10px; background:#fdebcf;
                    color:#8a5a12; font-size:0.82rem; font-weight:600; cursor:pointer; }
    .alert-banner.active { background:var(--navy); color:#fff; }
    .alert-banner.static { cursor:default; }
    .chip.stale { background:#fde9c8; color:#8a5a12; font-weight:700; }
    .hidden { display:none; }
    /* Login screen */
    .login-wrap { min-height:60vh; display:flex; align-items:center; justify-content:center; padding:24px 0; }
    .login-card { width:100%; max-width:340px; background:#fff; border:1px solid var(--line);
                  border-radius:16px; padding:28px 24px; box-shadow:0 8px 30px rgba(11,37,69,0.08); }
    .login-title { font-size:1.4rem; font-weight:800; color:var(--navy); letter-spacing:-0.01em; }
    .login-sub { font-family:"DM Mono",monospace; font-size:0.7rem; text-transform:uppercase;
                 letter-spacing:0.12em; color:var(--gold); margin:2px 0 18px; }
    .login-lbl { display:block; font-size:0.72rem; font-weight:700; color:var(--muted);
                 text-transform:uppercase; letter-spacing:0.04em; margin:12px 0 6px; }
    .login-input { width:100%; box-sizing:border-box; padding:11px 12px; border:1px solid var(--line);
                   border-radius:10px; font-size:0.95rem; font-family:inherit; color:var(--ink); }
    .login-input:focus { outline:none; border-color:var(--navy); }
    .login-btn { width:100%; margin-top:20px; }
    .login-error { min-height:1.1em; margin-top:12px; font-size:0.82rem; color:var(--red); text-align:center; }
    /* Manager dashboard */
    .dash-region-row { margin-bottom:14px; }
    .dash-region-row .filt { width:100%; }
    .dash-tiles { margin-bottom:8px; }
    .dash-sub { font-size:0.82rem; color:var(--muted); margin:0 0 18px; }
    .dash-sub b { color:var(--ink); }
    .dash-card { background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:18px; }
    .stage-legend { display:flex; flex-direction:column; gap:5px; margin-top:12px; font-size:0.7rem; color:var(--muted); }
    .stage-legend span { display:inline-flex; align-items:center; gap:7px; }
    .stage-legend i { width:10px; height:10px; border-radius:2px; display:inline-block; flex:none; }
    .rep-stats { padding:0; }
    .rep-stat-row { display:flex; flex-direction:column; gap:5px; padding:12px 16px; border-bottom:1px solid var(--line); }
    .rep-stat-row:last-child { border-bottom:none; }
    .rep-stat-name { font-weight:700; color:var(--ink); font-size:0.9rem; }
    .rep-stat-region { font-weight:500; color:var(--muted); font-size:0.72rem; margin-left:8px; }
    .rep-stat-cells { display:flex; flex-wrap:wrap; gap:5px 16px; font-size:0.8rem; color:var(--muted); }
    .rep-stat-cells b { color:var(--ink); }
    .rep-stat-cells .rep-overdue b { color:var(--red); }
    .rep-stat-empty { padding:18px 16px; text-align:center; color:var(--muted); font-size:0.85rem; }
    /* Dashboard filters + horizontal bars */
    .dash-filters { display:flex; flex-direction:column; gap:14px; margin-bottom:16px; }
    .dash-filters .filt { width:100%; box-sizing:border-box; }
    .dash-reps-lbl { display:flex; align-items:center; justify-content:space-between; font-size:0.72rem;
                     font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px; }
    #dash-reps { padding:6px; height:auto; }
    .rep-checks { display:flex; flex-wrap:wrap; gap:8px; }
    .rep-check { display:inline-flex; align-items:center; gap:6px; padding:7px 12px; border:1px solid var(--line);
                 border-radius:20px; font-size:0.8rem; cursor:pointer; background:#fff; color:var(--ink); user-select:none; }
    .rep-check input { margin:0; accent-color:var(--navy); cursor:pointer; }
    .rep-check:has(input:checked) { background:var(--navy); color:#fff; border-color:var(--navy); }
    .rep-check:has(input:checked) input { accent-color:#fff; }
    .dash-hint { font-size:0.68rem; color:var(--muted); margin-top:5px; }
    .dash-clear { padding:3px 10px; font-size:0.7rem; text-transform:none; letter-spacing:0; }
    .hbar { margin-bottom:12px; }
    .hbar:last-child { margin-bottom:0; }
    .hbar-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
    .hbar-name { font-size:0.76rem; color:var(--ink); font-weight:600; }
    .hbar-num { font-size:0.82rem; font-weight:700; color:var(--ink); }
    .hbar-track { background:#eef1f6; border-radius:5px; height:14px; overflow:hidden; }
    .hbar-fill { height:100%; border-radius:5px; min-width:3px; }
    .dash-total { margin-top:14px; padding-top:12px; border-top:1px solid var(--line); font-size:0.8rem;
                  font-weight:700; color:var(--ink); text-align:center; }
  </style>
</head>

<body>
  <header class="topbar">
    <span class="brand">NCRAM PIPELINE</span>
    <span id="role-pill"></span>
  </header>
  <main class="wrap"><div id="app"></div></main>
  <nav class="bottomnav" id="bottomnav"></nav>

  <!-- Supabase client library — loads before our app code so `supabase` exists. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    /* ============================================================ CONFIG */
    // ---- Supabase connection -------------------------------------------------
    // These point at your NCRAM Pipeline project. The publishable key is meant
    // to live in the browser — Row-Level Security is what protects the data, not
    // the secrecy of this key — so it's safe to keep right here in the file.
    const SUPABASE_URL      = "https://izbqtdzmfrqnpxxslzlp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_X6Xvz0GUfHndHsUxOZgfyw_7y2m2h2M";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ---- NCRAM Performance Dashboard ----------------------------------------
    // The "Dashboard" tab in the bottom nav opens this address in a new tab.
    // Paste the live web address of your Performance Dashboard between the quotes.
    const PERF_DASHBOARD_URL = "https://jonathanlundstrom-dev.github.io/RNCKA-Dashboard_Insights/";

    const SEGMENTS = ["B&I", "Healthcare", "Vending", "Collegiate", "Fitness", "Travel"];
    // Color key per segment, aligned to the standard circle-emoji colors so the
    // dots shown in dropdowns match the pills on cards.
    const SEGMENT_COLORS = {
      "B&I":"#3B82F6", "Healthcare":"#EF4444", "Vending":"#F97316",
      "Collegiate":"#A855F7", "Fitness":"#22C55E", "Travel":"#EAB308",
    };
    const SEGMENT_EMOJI = {
      "B&I":"🔵", "Healthcare":"🔴", "Vending":"🟠",
      "Collegiate":"🟣", "Fitness":"🟢", "Travel":"🟡",
    };
    function segColor(s) { return SEGMENT_COLORS[s] || "#6b7686"; }
    function segEmoji(s) { return SEGMENT_EMOJI[s] || "⚪"; }
    const BI_SUBCATEGORIES = ["White Collar", "Blue Collar"];
    const FMCS = ["Aramark", "Sodexo", "Compass Group", "Other"];
    // Suggested call types for the call log (the field stays free-text via datalist).
    const CALL_TYPES = ["Phone", "Email", "In-person meeting", "Video call", "Text / SMS", "Drop-in"];
    // Activation kinds for the execution section.
    const ACTIVATION_TYPES = ["Sampling", "Activation", "Both"];
    // Cold-equipment (cooler) types — rendered alphabetically in the call log.
    const COOLER_TYPES = [
      "Baby Cooler", "Large GDC", "Medium GDC", "Medium Slim",
      "Mega GDC", "Mega Slim", "Pick & Mix", "Small GDC",
    ];
    // Red Bull SKUs — rendered alphabetically. Size is the differentiator (all 24-pack).
    const SKU_TYPES = [
      "Red Bull Energy Drink 8.4oz", "Red Bull Sugarfree 8.4oz",
      "Red Bull Peach Edition (White Peach) 8.4oz", "Red Bull Sea Blue Edition (Juneberry) 8.4oz",
      "Red Bull Red Edition (Watermelon) 8.4oz", "Red Bull Zero 8.4oz",
      "Red Bull Energy Drink 12oz", "Red Bull Sugarfree 12oz",
      "Red Bull Peach Edition (White Peach) 12oz", "Red Bull Sea Blue Edition (Juneberry) 12oz",
      "Red Bull Red Edition (Watermelon) 12oz", "Red Bull Amber Edition (Strawberry Apricot) 12oz",
      "Red Bull Yellow Edition (Tropical) 12oz", "Red Bull Zero 12oz",
    ];
    const REGIONS = ["West", "Central", "Midwest", "Northeast", "Southeast"];
    const STAGES = {
      1:"Customer Knowledge", 2:"Customer Engagement", 3:"Customer Pitch",
      4:"Field Test & Approval", 5:"Implementation / Account Won",
    };
    const STAGE_COLORS = { 1:"#D64545", 2:"#E1833C", 3:"#F0C419", 4:"#7FB85C", 5:"#2E8B57" };
    // Circle-emoji dots for stages (shown in dropdowns). 4 and 5 both read green —
    // the only green circle emoji — while their actual dots/bars stay light vs dark.
    const STAGE_EMOJI = { 1:"🔴", 2:"🟠", 3:"🟡", 4:"🟢", 5:"🟢" };
    function stageEmoji(n) { return STAGE_EMOJI[n] || "⚪"; }
    // The team is loaded from the profiles table after login (see loadPeople).
    // Each entry: { id, name, role, region, title }. This replaces the old
    // hardcoded lists so the app always reflects who's really in the system.
    let people = [];
    function personById(id) { return people.find(p => p.id === id); }
    function repName(id)   { const p = personById(id); return p ? p.name : "Unassigned"; }
    function repRegion(id) { const p = personById(id); return p && p.region ? p.region : "—"; }
    // Owner <option>s grouped under headers: Managers first, then reps by region.
    function repOptionsGrouped(selectedId) {
      const sel = id => (id === selectedId ? " selected" : "");
      const mgrs = people.filter(p => p.role === "manager")
        .map(p => '<option value="'+p.id+'"'+sel(p.id)+'>'+esc(p.name)+'</option>').join("");
      const mgrGroup = mgrs ? '<optgroup label="Managers">'+mgrs+'</optgroup>' : "";
      const repGroups = REGIONS.map(r => {
        const opts = people.filter(p => p.role === "rep" && p.region === r)
          .map(p => '<option value="'+p.id+'"'+sel(p.id)+'>'+esc(p.name)+'</option>').join("");
        return opts ? '<optgroup label="'+r+'">'+opts+'</optgroup>' : "";
      }).join("");
      return mgrGroup + repGroups;
    }
    // Flat owner <option>s for the filter dropdowns.
    function ownerOptionsFlat(selectedId) {
      return people.map(p => '<option value="'+p.id+'"'+(p.id===selectedId?" selected":"")+'>'+esc(p.name)+'</option>').join("");
    }
    // Load the whole team from the database (everyone can read profiles).
    async function loadPeople() {
      const { data, error } = await sb.from("profiles").select("*");
      if (error) { console.error("loadPeople:", error.message); people = []; return; }
      people = (data || []).map(p => ({ id:p.id, name:p.full_name, role:p.role, region:p.region, title:p.title, avatarUrl:p.avatar_url }));
    }
    function fmtDate(d)    { return d ? new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : ""; }
    function todayStr()    { return new Date().toISOString().slice(0,10); }
    // Escape user-entered text before putting it in HTML (prevents broken markup / injection).
    function esc(s) { return String(s==null?"":s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    // Staleness: an active, in-progress account with no note or stage change in 2 weeks.
    const STALE_DAYS = 14;
    function daysSince(dateStr) {
      if (!dateStr) return Infinity;
      return Math.floor((new Date(todayStr()+"T00:00:00") - new Date(dateStr+"T00:00:00")) / 86400000);
    }
    function needsUpdate(a) {
      return a.status === "active" && a.stage < 5 && daysSince(a.lastTouch) >= STALE_DAYS;
    }

    /* ============================================ CURRENT USER + ACCESS */
    // Null until a successful login fills it in (see the AUTH section below).
    let currentUser = null;
    function isManager()      { return currentUser && currentUser.role === "manager"; }
    function canEdit(account) { return isManager() || account.ownerId === currentUser.repId; }

    // Profile pictures, keyed by the logged-in user's id (manager or rep).
    // (Avatars are stored in the database — see avatar handling below.)
    function userInitials(name) { return (name||"").split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }

    // Line icons for the bottom navigation.
    const SVG = 'viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
    const ICONS = {
      home:     '<svg '+SVG+'><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>',
      pipeline: '<svg '+SVG+'><path d="M4 5h16l-6 7v5l-4 2v-7z"/></svg>',
      calls:    '<svg '+SVG+'><path d="M6.6 10.8a13 13 0 006.6 6.6l2.2-2.2a1 1 0 011-.24 11 11 0 003.4.55 1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1 11 11 0 00.55 3.4 1 1 0 01-.24 1z"/></svg>',
      wins:     '<svg '+SVG+'><path d="M8 4h8v5a4 4 0 01-8 0z"/><path d="M8 5H5v1.5a3 3 0 003 2.6M16 5h3v1.5a3 3 0 01-3 2.6"/><path d="M12 13v3M9.5 20h5M10 16h4"/></svg>',
      team:     '<svg '+SVG+'><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19a5.5 5.5 0 0111 0"/><path d="M16.5 5.2a3.2 3.2 0 010 5.6M20.5 19a5.5 5.5 0 00-4.2-5.3"/></svg>',
      camera:   '<svg '+SVG+' width="14" height="14"><path d="M5 8h2.5L9 6h6l1.5 2H19v10H5z"/><circle cx="12" cy="13" r="3"/></svg>',
      dashboard:'<svg '+SVG+'><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>',
    };

    /* ============================================================ DATA */
    // Accounts now live in Supabase. This array is a local cache — a mirror of
    // the rows the database returns for whoever is logged in (RLS decides which
    // rows that is). Reads come from this cache so the UI stays instant; writes
    // go to the database and then update the cache. loadAccounts() fills it.
    let accounts = [];

    // The seam's translation layer. The database speaks snake_case; the app
    // speaks camelCase. These two functions are the one place that knows both.
    const ACCOUNT_FIELDS = {
      accountName:"account_name", segment:"segment", biSubCategory:"bi_subcategory",
      fmcManaged:"fmc_managed", fmcName:"fmc_name", sectorLob:"sector_lob", stage:"stage", status:"status",
      annualVolume:"annual_volume", address:"address", city:"city", state:"state", zip:"zip",
      primaryContact:"primary_contact", phone:"phone", email:"email",
      nextStep:"next_step", nextStepDate:"next_step_date", wonDate:"won_date",
      lostReason:"lost_reason", lostDate:"lost_date", lastTouch:"last_touch", ownerId:"owner_id",
      photos:"photos",
    };
    // App object → database row. Only maps keys that are actually present, so the
    // same function serves a full insert and a partial update. Empty strings
    // become null, because the database rejects "" for its date columns.
    function accountToRow(obj) {
      const row = {};
      for (const key in ACCOUNT_FIELDS) {
        if (!(key in obj)) continue;
        let val = obj[key];
        if (val === "") val = null;
        row[ACCOUNT_FIELDS[key]] = val;
      }
      return row;
    }
    // Child rows (account_activity) → the app's activity items. Sorted oldest
    // first so the detail view's reverse() shows newest at the top.
    function activityRowsToItems(rows) {
      return (rows || [])
        .slice()
        .sort((a, b) => (a.created_at || "").localeCompare(b.created_at || ""))
        .map(r => ({ id:r.id, date:r.logged_at, text:r.note }));
    }
    // Database row → app object. Photos still live only in memory (Storage step);
    // activity now comes from the account_activity table when it's embedded.
    function rowToAccount(r) {
      return {
        id:r.id, accountName:r.account_name, segment:r.segment, biSubCategory:r.bi_subcategory,
        fmcManaged:!!r.fmc_managed, fmcName:r.fmc_name, sectorLob:r.sector_lob||"", stage:r.stage, status:r.status || "active",
        annualVolume:r.annual_volume || 0,
        address:r.address||"", city:r.city||"", state:r.state||"", zip:r.zip||"",
        primaryContact:r.primary_contact||"", phone:r.phone||"", email:r.email||"",
        nextStep:r.next_step||"", nextStepDate:r.next_step_date||"",
        wonDate:r.won_date||"", lostReason:r.lost_reason||"", lostDate:r.lost_date||"",
        lastTouch:r.last_touch || todayStr(), ownerId:r.owner_id,
        createdAt:r.created_at, updatedAt:r.updated_at,
        photos: r.photos || [], activity: activityRowsToItems(r.account_activity),
      };
    }

    /* ====================================================== DATA ACCESS */
    // Reads are synchronous — they hit the local cache, so the UI stays instant.
    function getAccounts()  { return accounts; }
    function getAccount(id) { return accounts.find(a => a.id === id); }

    // Writes are async — they go to Supabase first, then update the cache, so the
    // screen and the database never disagree. Each returns the saved record (or
    // null/false on failure) so the caller knows whether to proceed.
    async function loadAccounts() {
      const { data, error } = await sb.from("accounts").select("*, account_activity(*)").order("created_at", { ascending:false });
      if (error) { console.error("loadAccounts:", error.message); accounts = []; return; }
      accounts = (data || []).map(rowToAccount);
    }
    async function addAccount(account) {
      const { data, error } = await sb.from("accounts").insert(accountToRow(account)).select().single();
      if (error) { alert("Couldn't save account: " + error.message); return null; }
      const saved = rowToAccount(data);
      accounts.unshift(saved);
      return saved;
    }
    async function updateAccount(id, changes) {
      const { data, error } = await sb.from("accounts").update(accountToRow(changes)).eq("id", id).select().single();
      if (error) { alert("Couldn't update account: " + error.message); return null; }
      const saved = rowToAccount(data);
      const i = accounts.findIndex(a => a.id === id);
      // activity lives in its own table (not returned by this update), so keep
      // the cached copy; photos come back with the row, so the fresh value wins.
      if (i >= 0) { saved.activity = accounts[i].activity; accounts[i] = saved; }
      else accounts.push(saved);
      return saved;
    }
    async function deleteAccount(id) {
      const { error } = await sb.from("accounts").delete().eq("id", id);
      if (error) { alert("Couldn't delete account: " + error.message); return false; }
      accounts = accounts.filter(a => a.id !== id);
      return true;
    }

    // Who sees what: manager sees all; a rep sees only their own.
    function visibleAccounts() {
      return isManager() ? getAccounts() : getAccounts().filter(a => a.ownerId === currentUser.repId);
    }
    // Apply the active search + filter state on top of what the user can see.
    function filteredAccounts() {
      const f = state.filters;
      return visibleAccounts().filter(a => {
        if (f.stale && !needsUpdate(a)) return false;
        if (f.status === "active" && a.status === "lost") return false;
        if (f.status === "lost"   && a.status !== "lost") return false;
        if (f.search && !a.accountName.toLowerCase().includes(f.search.toLowerCase())) return false;
        if (f.stage && a.stage !== Number(f.stage)) return false;
        if (f.segment && a.segment !== f.segment) return false;
        if (f.region && repRegion(a.ownerId) !== f.region) return false;
        if (f.owner && a.ownerId !== f.owner) return false;
        return true;
      });
    }

    /* ===================================================== CALL POINTS */
    // A rep's full book of accounts they service and call on — separate from
    // the active sales pipeline. No stage; the focus is regular engagement.
    // Same as accounts: this is a local cache mirroring the database.
    let callPoints = [];

    const CALLPOINT_FIELDS = {
      name:"name", segment:"segment", fmcManaged:"fmc_managed", fmcName:"fmc_name", sectorLob:"sector_lob",
      address:"address", city:"city", state:"state", zip:"zip",
      primaryContact:"primary_contact", phone:"phone", email:"email",
      lastCall:"last_call", ownerId:"owner_id",
      photos:"photos",
    };
    function callPointToRow(obj) {
      const row = {};
      for (const key in CALLPOINT_FIELDS) {
        if (!(key in obj)) continue;
        let val = obj[key];
        if (val === "") val = null;
        row[CALLPOINT_FIELDS[key]] = val;
      }
      return row;
    }
    // Child rows (call_logs) → the app's call items, oldest first.
    function callLogRowsToItems(rows) {
      return (rows || [])
        .slice()
        .sort((a, b) => (a.created_at || "").localeCompare(b.created_at || ""))
        .map(r => ({ id:r.id, date:r.logged_at, note:r.note,
                     callType:r.call_type || "", execution:r.execution || {} }));
    }
    function rowToCallPoint(r) {
      return {
        id:r.id, name:r.name, segment:r.segment,
        fmcManaged:!!r.fmc_managed, fmcName:r.fmc_name, sectorLob:r.sector_lob||"",
        address:r.address||"", city:r.city||"", state:r.state||"", zip:r.zip||"",
        primaryContact:r.primary_contact||"", phone:r.phone||"", email:r.email||"",
        lastCall:r.last_call||"", ownerId:r.owner_id,
        createdAt:r.created_at, updatedAt:r.updated_at,
        photos: r.photos || [], calls: callLogRowsToItems(r.call_logs),
      };
    }

    function getCallPoints()  { return callPoints; }
    function getCallPoint(id) { return callPoints.find(c => c.id === id); }
    async function loadCallPoints() {
      const { data, error } = await sb.from("call_points").select("*, call_logs(*)").order("created_at", { ascending:false });
      if (error) { console.error("loadCallPoints:", error.message); callPoints = []; return; }
      callPoints = (data || []).map(rowToCallPoint);
    }
    async function addCallPoint(cp) {
      const { data, error } = await sb.from("call_points").insert(callPointToRow(cp)).select().single();
      if (error) { alert("Couldn't save call point: " + error.message); return null; }
      const saved = rowToCallPoint(data);
      callPoints.unshift(saved);
      return saved;
    }
    async function updateCallPoint(id, changes) {
      const { data, error } = await sb.from("call_points").update(callPointToRow(changes)).eq("id", id).select().single();
      if (error) { alert("Couldn't update call point: " + error.message); return null; }
      const saved = rowToCallPoint(data);
      const i = callPoints.findIndex(c => c.id === id);
      if (i >= 0) { saved.calls = callPoints[i].calls; callPoints[i] = saved; }
      else callPoints.push(saved);
      return saved;
    }
    async function deleteCallPoint(id) {
      const { error } = await sb.from("call_points").delete().eq("id", id);
      if (error) { alert("Couldn't delete call point: " + error.message); return false; }
      callPoints = callPoints.filter(c => c.id !== id);
      return true;
    }
    function visibleCallPoints()   { return isManager() ? getCallPoints() : getCallPoints().filter(c => c.ownerId === currentUser.repId); }

    const CALL_STALE_DAYS = 28;            // 4 weeks
    function needsCall(c) { return daysSince(c.lastCall) >= CALL_STALE_DAYS; }

    /* =========================================================== STATE */
    const DEFAULT_FILTERS = { search:"", stage:"", segment:"", region:"", owner:"", status:"active", stale:false };
    const state = { view:"home", selectedId:null, editingId:null, filters:{ ...DEFAULT_FILTERS },
                    cpId:null, cpEditId:null, cpSearch:"", cpStale:false,
                    cpSegment:"", cpRegion:"", cpOwner:"", dashRegion:"", dashReps:[], dashSegment:"",
                    callLogCpId:null,
                    acctView: loadViewPref("ram_acctView"), cpView: loadViewPref("ram_cpView"),
                    callLog:{ type:"", note:"", cold:[], skus:[], actDone:false, actType:"Sampling", actNote:"" } };

    // Remembered card/list preference (falls back to cards).
    function loadViewPref(key) {
      try { const v = localStorage.getItem(key); return (v === "list" || v === "card") ? v : "card"; }
      catch (e) { return "card"; }
    }
    function saveViewPref(key, mode) { try { localStorage.setItem(key, mode); } catch (e) {} }

    // A fresh, empty call-log draft.
    function emptyCallLog() {
      return { type:"", note:"", cold:[], skus:[], actDone:false, actType:"Sampling", actNote:"" };
    }

    /* =========================================================== VIEWS */
    function ring(pct, label, color) {
      pct = Math.max(0, Math.min(100, Math.round(pct)));
      const r = 32, c = 2*Math.PI*r, off = c*(1 - pct/100);
      return '<div class="ring"><svg viewBox="0 0 84 84">'
        + '<circle cx="42" cy="42" r="'+r+'" stroke="#eef1f6" stroke-width="8" fill="none"/>'
        + '<circle cx="42" cy="42" r="'+r+'" stroke="'+color+'" stroke-width="8" fill="none" stroke-linecap="round" '
        +   'stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 42 42)"/>'
        + '<text x="42" y="47" text-anchor="middle" class="ring-pct">'+pct+'%</text>'
        + '</svg><div class="ring-label">'+label+'</div></div>';
    }

    // The manager-only performance dashboard on the home screen. Everything
    // recomputes from the current data and the chosen region, so it's always live.
    function managerDashboard() {
      const region   = state.dashRegion  || "";
      const segment  = state.dashSegment || "";
      const selected = state.dashReps    || [];
      const repPool = people.filter(p => p.role === "rep" && (!region || p.region === region))
        .sort((a, b) => a.name.localeCompare(b.name));
      // Selected reps win if any are checked; otherwise fall back to the region.
      const ownerMatch = ownerId => selected.length
        ? selected.includes(ownerId)
        : (!region || repRegion(ownerId) === region);

      // Active pipeline, filtered by rep/region and segment.
      const active = getAccounts().filter(a =>
        a.status !== "lost" && ownerMatch(a.ownerId) && (!segment || a.segment === segment));

      const regionOpts = '<option value="">All regions</option>' + REGIONS.map(r =>
        '<option value="'+r+'"'+(region===r?' selected':'')+'>'+r+'</option>').join("");
      const segOpts = '<option value="">All segments</option>' + segOptionTags(segment);
      const repChecks = repPool.map(p =>
        '<label class="rep-check"><input type="checkbox" class="dash-rep-cb" value="'+p.id+'"'+(selected.includes(p.id)?' checked':'')+'> '+esc(p.name)+'</label>').join("");
      const repClear = selected.length
        ? '<button class="btn btn-ghost dash-clear" data-action="dash-clear-reps">Clear ('+selected.length+')</button>' : "";

      return ''
        + '<div class="section-label">Pipeline by stage</div>'
        + '<div class="dash-filters">'
        +   '<select id="dash-region" class="filt">'+regionOpts+'</select>'
        +   '<select id="dash-segment" class="filt">'+segOpts+'</select>'
        +   '<div class="dash-reps-row"><label class="dash-reps-lbl"><span>Isolate reps</span>'+repClear+'</label>'
        +     '<div class="rep-checks">'+repChecks+'</div>'
        +     '<div class="dash-hint">Check one or more · none checked = all</div></div>'
        + '</div>'
        + pipelineBars(active);
    }

    // Shared horizontal pipeline-by-stage chart for any set of active accounts.
    function pipelineBars(active) {
      const byStage = [1,2,3,4,5].map(s => active.filter(a => a.stage === s).length);
      const maxCount = Math.max(1, ...byStage);
      const total = byStage.reduce((a, b) => a + b, 0);
      let barsHtml = "";
      [1,2,3,4,5].forEach((s, i) => {
        const cnt = byStage[i];
        const pct = Math.round(cnt / maxCount * 100);
        barsHtml += '<div class="hbar">'
          + '<div class="hbar-head"><span class="hbar-name">'+s+' · '+STAGES[s]+'</span><span class="hbar-num">'+cnt+'</span></div>'
          + '<div class="hbar-track"><div class="hbar-fill" style="width:'+pct+'%;background:'+STAGE_COLORS[s]+'"></div></div>'
          + '</div>';
      });
      return '<div class="dash-card">'+barsHtml+'<div class="dash-total">'+total+' active opportunities</div></div>';
    }

    // Rep home dashboard: their own pipeline (RLS already scopes the data to them),
    // with just a segment filter — region and rep-isolation don't apply to one rep.
    function repDashboard() {
      const segment = state.dashSegment || "";
      const active = getAccounts().filter(a => a.status !== "lost" && (!segment || a.segment === segment));
      const segOpts = '<option value="">All segments</option>' + segOptionTags(segment);
      return ''
        + '<div class="section-label">My pipeline by stage</div>'
        + '<div class="dash-filters"><select id="dash-segment" class="filt">'+segOpts+'</select></div>'
        + pipelineBars(active);
    }

    function landingView() {
      const pic = currentUser.avatarUrl;
      const inner = pic ? '<img src="'+esc(pic)+'" alt="profile" />' : userInitials(currentUser.name);
      const roleLabel = isManager()
        ? (currentUser.title || "Manager")
        : "NCRAM · "+(currentUser.region || "—");

      const accts = visibleAccounts();
      const active = accts.filter(a => a.status !== "lost" && a.stage < 5).length;
      const wins = accts.filter(a => a.stage === 5 && a.status !== "lost").length;
      const lost = accts.filter(a => a.status === "lost").length;
      const cps = visibleCallPoints();
      const callsDue = cps.filter(needsCall).length;

      return ''
        + '<div class="profile-cover"></div>'
        + '<div class="profile-card">'
        +   '<div class="avatar-wrap">'
        +     '<div class="avatar" data-action="avatar-edit">'+inner+'</div>'
        +     '<button class="avatar-edit" data-action="avatar-edit" title="Upload photo">'+ICONS.camera+'</button>'
        +     '<input type="file" id="avatar-input" accept="image/*" style="display:none" />'
        +   '</div>'
        +   '<div class="profile-name">'+esc(currentUser.name)+'</div>'
        +   '<div class="profile-role">'+roleLabel+'</div>'
        +   '<div class="demo-switch"><button class="btn btn-ghost btn-logout" data-action="logout">Sign out</button></div>'
        + '</div>'
        + '<div class="section-label">Snapshot</div>'
        + '<div class="tiles">'
        +   '<div class="tile"><div class="tile-num">'+active+'</div><div class="tile-lbl">Active</div></div>'
        +   '<div class="tile"><div class="tile-num">'+wins+'</div><div class="tile-lbl">Wins</div></div>'
        +   '<div class="tile"><div class="tile-num'+(callsDue?' alert':'')+'">'+callsDue+'</div><div class="tile-lbl">Calls Due</div></div>'
        + '</div>'
        + '<div class="section-label">Quick actions</div>'
        + '<div class="quick">'
        +   '<button class="btn btn-ghost" data-action="add">+ New Pipeline Account</button>'
        +   '<button class="btn btn-ghost" data-action="cp-add">+ New Call Point</button>'
        + '</div>'
        + (isManager() ? managerDashboard() : repDashboard());
    }

    // Readable text color for a filled pill, based on the color's luminance.
    function textOn(hex) {
      const c = hex.replace("#", "");
      const r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
      return (0.299*r + 0.587*g + 0.114*b) > 130 ? "#1a2432" : "#fff";
    }
    // Colored segment pill (the segment color key).
    function segmentPill(s) {
      const col = segColor(s);
      return '<span class="chip seg-pill" style="background:'+col+';color:'+textOn(col)+'">'+esc(s)+'</span>';
    }
    // Segment <option> tags with a colored dot prefixed to each name. The option
    // VALUE stays the clean segment string; the emoji lives only in the label.
    function segOptionTags(selected) {
      return SEGMENTS.map(s =>
        '<option value="'+esc(s)+'"'+(s===selected?' selected':'')+'>'+segEmoji(s)+' '+esc(s)+'</option>').join("");
    }

    function accountCard(a) {
      const lost = a.status === "lost";
      const color = STAGE_COLORS[a.stage];
      let segs = "";
      for (let i = 1; i <= 5; i++) {
        const bg = i <= a.stage ? STAGE_COLORS[i] : "var(--line)";
        segs += '<div class="seg" style="background:' + bg + '"></div>';
      }
      const lostChip = lost ? '<span class="chip lost">Lost</span>' : "";
      const staleChip = needsUpdate(a) ? '<span class="chip stale">Needs updating</span>' : "";
      const subCat = a.biSubCategory ? '<span class="chip">'+a.biSubCategory+'</span>' : "";
      const fmc = a.fmcManaged ? '<span class="chip fmc">'+esc(a.fmcName)+'</span>' : '<span class="chip">Self-op</span>';
      const photoStrip = (a.photos && a.photos.length)
        ? '<div class="card-photos">' + a.photos.slice(0,4).map(p => '<img src="'+p.url+'" alt="" />').join("")
          + (a.photos.length > 4 ? '<div class="more">+'+(a.photos.length-4)+'</div>' : '') + '</div>'
        : "";
      let nextLine = "";
      if (!lost && (a.nextStep || a.nextStepDate)) {
        const overdue = a.nextStepDate && a.nextStepDate < todayStr();
        nextLine = '<div class="nextstep'+(overdue?' overdue':'')+'">Next: '
          + esc(a.nextStep || "—")
          + (a.nextStepDate ? ' · '+fmtDate(a.nextStepDate)+(overdue?' (overdue)':'') : '') + '</div>';
      }
      return ''
        + '<article class="card'+(lost?' lost':'')+'" data-action="open" data-id="'+a.id+'">'
        +   '<div class="card-top"><h2 class="card-name">'+esc(a.accountName)+'</h2>'
        +     '<span class="owner">'+repName(a.ownerId)+'<br>'+repRegion(a.ownerId)+'</span></div>'
        +   '<div class="chips">'+staleChip+lostChip+segmentPill(a.segment)+subCat+fmc+'</div>'
        +   '<div class="stage"><div class="stage-label"><span class="dot" style="background:'+color+'"></span>'
        +     'Stage '+a.stage+' · '+STAGES[a.stage]+'</div><div class="stage-bar">'+segs+'</div></div>'
        +   nextLine + photoStrip
        + '</article>';
    }

    // Card / List segmented toggle. target is "acct" or "cp".
    function viewToggle(target, current) {
      const grid = '<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>';
      const rows = '<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="3" y="4" width="18" height="4" rx="1.5"/><rect x="3" y="10" width="18" height="4" rx="1.5"/><rect x="3" y="16" width="18" height="4" rx="1.5"/></svg>';
      const opt = (mode, label, icon) =>
        '<button class="vt'+(current===mode?' on':'')+'" data-action="set-view" data-target="'+target+'" data-mode="'+mode+'">'+icon+label+'</button>';
      return '<div class="viewtoggle">'+opt("card","Cards",grid)+opt("list","List",rows)+'</div>';
    }

    // Compact one-line account row (list view).
    function accountRow(a) {
      const lost = a.status === "lost";
      const color = STAGE_COLORS[a.stage];
      const staleDot = needsUpdate(a) ? '<span class="lrow-flag" title="Needs updating"></span>' : "";
      const meta = 'Stage ' + a.stage + ' · ' + repName(a.ownerId)
                 + (isManager() ? ' · ' + repRegion(a.ownerId) : '');
      const side = lost ? '<span class="chip lost">Lost</span>' : '<span class="lrow-chev">›</span>';
      return ''
        + '<div class="lrow'+(lost?' lost':'')+'" data-action="open" data-id="'+a.id+'">'
        +   '<span class="lrow-dot" style="background:'+color+'"></span>'
        +   '<div class="lrow-main"><div class="lrow-name">'+esc(a.accountName)+staleDot+'</div>'
        +     '<div class="lrow-sub">'+segmentPill(a.segment)+'<span class="lrow-meta">'+esc(meta)+'</span></div></div>'
        +   '<div class="lrow-side">'+side+'</div>'
        + '</div>';
    }

    function listView() {
      const f = state.filters;
      const title = isManager() ? "Pipeline — all reps" : "My accounts";
      const stageOpts = '<option value="">All stages</option>' + Object.keys(STAGES).map(n =>
        '<option value="'+n+'"'+(f.stage===n?' selected':'')+'>'+stageEmoji(n)+' Stage '+n+'</option>').join("");
      const segOpts = '<option value="">All segments</option>' + segOptionTags(f.segment);
      const statusLabels = { active:"Active", lost:"Lost", all:"All status" };
      const statusOpts = ["active","lost","all"].map(s =>
        '<option value="'+s+'"'+(f.status===s?' selected':'')+'>'+statusLabels[s]+'</option>').join("");
      let mgrFilters = "";
      if (isManager()) {
        const regionOpts = '<option value="">All regions</option>' + REGIONS.map(r =>
          '<option value="'+r+'"'+(f.region===r?' selected':'')+'>'+r+'</option>').join("");
        const ownerOpts = '<option value="">All owners</option>' + ownerOptionsFlat(f.owner);
        mgrFilters = '<select id="flt-region" class="filt">'+regionOpts+'</select>'
                   + '<select id="flt-owner" class="filt">'+ownerOpts+'</select>';
      }
      return ''
        + '<div class="toolbar"><h2 class="toolbar-title">'+title+'</h2>'
        +   '<button class="btn btn-primary" data-action="add">+ Add account</button></div>'
        + '<input id="flt-search" class="search" type="search" placeholder="Search accounts by name…" value="'+esc(f.search)+'" />'
        + '<div class="filters">'
        +   '<select id="flt-stage" class="filt">'+stageOpts+'</select>'
        +   '<select id="flt-segment" class="filt">'+segOpts+'</select>'
        +   mgrFilters
        +   '<select id="flt-status" class="filt">'+statusOpts+'</select>'
        + '</div>'
        + '<div id="results"></div>';
    }

    // Only the results list re-renders on search/filter, so the search box keeps focus.
    function renderResults() {
      const el = document.getElementById("results");
      if (!el) return;
      const data = filteredAccounts();
      const total = visibleAccounts().length;
      const staleCount = visibleAccounts().filter(needsUpdate).length;
      let banner = "";
      if (state.filters.stale)
        banner = '<div class="alert-banner active" data-action="toggle-stale">Showing accounts that need updating — tap to clear</div>';
      else if (staleCount > 0)
        banner = '<div class="alert-banner" data-action="toggle-stale">'+staleCount+' account'+(staleCount>1?'s':'')+' need updating — no note or stage change in 2 weeks</div>';
      const layout = state.acctView === "list" ? "list" : "card";
      const body = data.length
        ? (layout === "list"
            ? '<div class="rows">' + data.map(accountRow).join("") + '</div>'
            : '<div class="list">' + data.map(accountCard).join("") + '</div>')
        : '<p style="color:var(--muted)">No accounts match these filters.</p>';
      el.innerHTML = banner
        + '<div class="results-head"><p class="count">Showing '+data.length+' of '+total+'</p>'
        +   viewToggle("acct", layout) + '</div>'
        + body;
    }

    function teamView() {
      let html = '<h2 class="toolbar-title" style="margin-bottom:14px">Team — all regions</h2>';
      REGIONS.forEach(region => {
        const reps = people.filter(p => p.role === "rep" && p.region === region);
        if (!reps.length) return;
        html += '<div class="team-region"><div class="region-head">'+region+'</div>';
        reps.forEach(p => {
          const owned = getAccounts().filter(a => a.ownerId === p.id && a.status !== "lost");
          const won = owned.filter(a => a.stage === 5).length;
          html += '<div class="rep-row"><span class="rep-name">'+esc(p.name)+'</span>'
                + '<span class="rep-stats">'+owned.length+' active · '+won+' won</span></div>';
        });
        html += '</div>';
      });
      const anyReps = people.some(p => p.role === "rep");
      if (!anyReps) html += '<p style="color:var(--muted)">No reps added yet.</p>';
      return html;
    }

    function winsView() {
      const wins = visibleAccounts().filter(a => a.stage === 5 && a.status !== "lost");
      const totalVol = wins.reduce((s,a) => s + (a.annualVolume || 0), 0);
      const summary = '<div class="wins-summary">'
        + '<div class="ws-stat"><div class="ws-num">'+wins.length+'</div><div class="ws-lbl">Wins</div></div>'
        + '<div class="ws-stat"><div class="ws-num">'+totalVol.toLocaleString()+'</div><div class="ws-lbl">Cases / yr</div></div>'
        + '</div>';
      let regionBlock = "";
      if (isManager()) {
        const byRegion = REGIONS.map(r => {
          const rw = wins.filter(a => repRegion(a.ownerId) === r);
          return { r, n:rw.length, vol: rw.reduce((s,a)=>s+(a.annualVolume||0),0) };
        }).filter(x => x.n > 0);
        if (byRegion.length)
          regionBlock = '<div class="form-section">By region</div><div class="detail-rows">'
            + byRegion.map(x => '<div class="row"><span class="k">'+x.r+'</span>'
                + '<span class="v">'+x.n+' won · '+x.vol.toLocaleString()+' cases</span></div>').join("")
            + '</div>';
      }
      const items = wins.length
        ? wins.map(a => '<article class="card" data-action="open" data-id="'+a.id+'">'
            + '<div class="card-top"><h2 class="card-name">'+esc(a.accountName)+'</h2>'
            + '<span class="owner">'+repName(a.ownerId)+'<br>'+repRegion(a.ownerId)+'</span></div>'
            + '<div class="chips"><span class="chip">'+a.segment+'</span>'
            + (a.wonDate ? '<span class="chip">Won '+fmtDate(a.wonDate)+'</span>' : '')
            + (a.annualVolume ? '<span class="chip">'+a.annualVolume.toLocaleString()+' cases/yr</span>' : '')
            + '</div></article>').join("")
        : '<p style="color:var(--muted)">No wins yet. Accounts land here when they reach stage 5.</p>';
      const title = isManager() ? "Wins — all reps" : "My wins";
      return '<h2 class="toolbar-title" style="margin-bottom:14px">'+title+'</h2>'
        + summary + regionBlock + '<div class="list" style="margin-top:14px">'+items+'</div>';
    }

    function detailView() {
      const a = getAccount(state.selectedId);
      if (!a) return '<p>Account not found.</p>';
      const color = STAGE_COLORS[a.stage];
      const editable = canEdit(a);
      const lost = a.status === "lost";
      const staleNote = needsUpdate(a)
        ? '<div class="alert-banner static">Needs updating — '+daysSince(a.lastTouch)+' days since the last note or stage change.</div>'
        : "";
      const row = (k, v) => v ? '<div class="row"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>' : "";
      const addressLine = a.address ? esc(a.address+', '+a.city+', '+a.state+' '+a.zip) : "";

      // Next-step callout
      let nextBlock = "";
      if (!lost && (a.nextStep || a.nextStepDate)) {
        const overdue = a.nextStepDate && a.nextStepDate < todayStr();
        nextBlock = '<div class="next-callout'+(overdue?' overdue':'')+'"><strong>Next step:</strong> '
          + esc(a.nextStep || "—")
          + (a.nextStepDate ? ' · due '+fmtDate(a.nextStepDate)+(overdue?' (overdue)':'') : '') + '</div>';
      }

      // Activity log
      const activityList = a.activity.length
        ? '<div class="activity">' + a.activity.slice().reverse().map(n =>
            '<div class="act"><span class="act-date">'+fmtDate(n.date)+'</span><span>'+esc(n.text)+'</span></div>').join("") + '</div>'
        : '<p style="color:var(--muted);font-size:0.85rem;margin-top:8px">No activity logged yet.</p>';
      const noteAdd = editable
        ? '<div class="note-add"><input id="note-input" type="text" placeholder="Log a touchpoint…" />'
          + '<button class="btn btn-ghost" data-action="add-note" data-id="'+a.id+'">Add</button></div>'
        : "";

      // Photos
      const thumbs = a.photos.length
        ? '<div class="photo-grid">' + a.photos.map(p =>
            '<div class="photo-thumb"><img src="'+p.url+'" alt="account photo" />'
            + (editable ? '<button class="photo-del" data-action="del-photo" data-id="'+a.id+'" data-photo="'+p.id+'">×</button>' : '')
            + '</div>').join("") + '</div>'
        : '<p style="color:var(--muted);font-size:0.85rem;margin-top:8px">No photos yet.</p>';
      const addPhoto = editable
        ? '<input type="file" id="photo-input" accept="image/*" multiple style="display:none" />'
          + '<div class="form-actions"><button class="btn btn-ghost" data-action="add-photo">+ Add photo</button></div>'
        : "";

      const editBtn = editable
        ? '<div class="form-actions"><button class="btn btn-primary" data-action="edit">Edit account</button></div>' : "";
      const note = editable
        ? (isManager() ? "Manager access — you can edit this account or reassign its owner." : "You own this account, so you can edit it.")
        : "Owned by "+repName(a.ownerId)+" ("+repRegion(a.ownerId)+"). View only — only the owner can edit.";

      return ''
        + '<button class="back" data-action="back">‹ Back to pipeline</button>'
        + '<h2 class="detail-name">'+esc(a.accountName)+'</h2>'
        + '<div class="stage-label"><span class="dot" style="background:'+color+'"></span>'
        +   'Stage '+a.stage+' · '+STAGES[a.stage]+(lost?'  —  <span style="color:var(--red)">Lost</span>':'')+'</div>'
        + staleNote
        + nextBlock
        + '<div class="detail-rows">'
        +   row("Segment", a.segment) + row("B&I sub-category", a.biSubCategory)
        +   row("FMC managed", a.fmcManaged ? "Yes" : "No") + row("FMC", esc(a.fmcName))
        +   (a.fmcManaged ? row("Sector/LOB", esc(a.sectorLob)) : "")
        +   row("Owner", repName(a.ownerId)) + row("Region", repRegion(a.ownerId))
        +   row("Annual volume", a.annualVolume ? a.annualVolume.toLocaleString()+" cases" : "")
        +   (a.stage===5 && a.wonDate ? row("Date won", fmtDate(a.wonDate)) : "")
        +   (lost ? row("Lost reason", esc(a.lostReason)) : "")
        +   (lost && a.lostDate ? row("Date lost", fmtDate(a.lostDate)) : "")
        +   row("Address", addressLine) + row("Primary contact", esc(a.primaryContact))
        +   row("Phone", esc(a.phone)) + row("Email", esc(a.email))
        + '</div>'
        + editBtn
        + '<div class="form-section">Activity</div>' + noteAdd + activityList
        + '<div class="form-section">Photos ('+a.photos.length+')</div>' + thumbs + addPhoto
        + '<p class="ownership-note">'+note+'</p>';
    }

    function formView(account) {
      const g = k => (account && account[k] != null) ? account[k] : "";
      const optList = (list, cur) => list.map(x => '<option value="'+x+'"'+(x===cur?' selected':'')+'>'+x+'</option>').join("");
      const isEdit   = !!account;
      const curStage = account ? String(account.stage) : "1";
      const curFmc   = account ? (account.fmcManaged ? "yes" : "no") : "";
      const curOwner = account ? account.ownerId : currentUser.id;
      const curStatus= account ? account.status : "active";

      const segOpts   = '<option value="">— Select —</option>' + segOptionTags(g("segment"));
      const subOpts   = '<option value="">— Select —</option>' + optList(BI_SUBCATEGORIES, g("biSubCategory"));
      // FMC: a stored name that isn't one of the known companies means "Other" was
      // used — select Other and pre-fill the free-text box with the saved name.
      const knownFmcs   = FMCS.filter(f => f !== "Other");
      const storedFmc   = g("fmcName") || "";
      const fmcIsOther  = !!storedFmc && !knownFmcs.includes(storedFmc);
      const fmcOpts   = '<option value="">— Select —</option>' + optList(FMCS, fmcIsOther ? "Other" : storedFmc);
      const stageOpts = Object.keys(STAGES).map(n =>
        '<option value="'+n+'"'+(n===curStage?' selected':'')+'>'+stageEmoji(n)+' Stage '+n+' · '+STAGES[n]+'</option>').join("");
      const ownerOpts = repOptionsGrouped(curOwner);

      const subHidden  = (account && account.segment === "B&I") ? "" : " hidden";
      const fmcHidden  = (account && account.fmcManaged) ? "" : " hidden";
      const fmcOtherHidden = (account && account.fmcManaged && fmcIsOther) ? "" : " hidden";
      const lostHidden = (curStatus === "lost") ? "" : " hidden";
      const ownerField = isManager()
        ? '<div class="field"><label>Owner (assign)</label><select id="f-owner">'+ownerOpts+'</select></div>' : "";
      const deleteRow = isEdit
        ? '<div class="danger-row"><button class="btn btn-danger" data-action="delete">Delete account</button></div>' : "";

      return ''
        + '<button class="back" data-action="cancel-form">‹ Cancel</button>'
        + '<h2 class="detail-name">'+(isEdit?'Edit account':'New account')+'</h2>'
        + '<div class="form-msg" id="form-msg"></div>'
        + '<div class="form-section">Account</div>'
        + '<div class="field"><label>Account name</label>'
        +   '<input id="f-name" type="text" value="'+esc(g("accountName"))+'" placeholder="e.g. Summit Logistics HQ" /></div>'
        + ownerField
        + '<div class="field"><label>Segment</label><select id="f-segment">'+segOpts+'</select></div>'
        + '<div class="field'+subHidden+'" id="field-subcat"><label>B&I sub-category</label><select id="f-subcat">'+subOpts+'</select></div>'
        + '<div class="field"><label>FMC managed?</label><select id="f-fmc">'
        +   '<option value="">— Select —</option>'
        +   '<option value="yes"'+(curFmc==="yes"?" selected":"")+'>Yes</option>'
        +   '<option value="no"'+(curFmc==="no"?" selected":"")+'>No</option></select></div>'
        + '<div class="field'+fmcHidden+'" id="field-fmcname"><label>FMC</label><select id="f-fmcname">'+fmcOpts+'</select></div>'
        + '<div class="field'+fmcOtherHidden+'" id="field-fmcother"><label>FMC name (Other)</label>'
        +   '<input id="f-fmcother" type="text" value="'+esc(fmcIsOther ? storedFmc : "")+'" placeholder="Type the FMC name" /></div>'
        + '<div class="field'+fmcHidden+'" id="field-sectorlob"><label>Sector/LOB</label>'
        +   '<input id="f-sectorlob" type="text" value="'+esc(g("sectorLob"))+'" placeholder="Sector/Line of Business" /></div>'
        + '<div class="field"><label>Stage</label><select id="f-stage">'+stageOpts+'</select></div>'
        + '<div class="field"><label>Annual volume (cases)</label>'
        +   '<input id="f-volume" type="number" min="0" value="'+(g("annualVolume")||0)+'" /></div>'
        + '<div class="field"><label>Pipeline status</label><select id="f-status">'
        +   '<option value="active"'+(curStatus==="active"?" selected":"")+'>Active</option>'
        +   '<option value="lost"'+(curStatus==="lost"?" selected":"")+'>Lost</option></select></div>'
        + '<div class="field'+lostHidden+'" id="field-lostreason"><label>Reason lost</label>'

    /* ========================================================= ACTIONS */
    async function saveForm() {
      const v = id => document.getElementById(id).value;
      const name = v("f-name").trim();
      const segment = v("f-segment");
      if (!name || !segment) {
        document.getElementById("form-msg").textContent = "Account name and segment are required.";
        return;
      }
      const fmcManaged = v("f-fmc") === "yes";
      const fmcPicked  = v("f-fmcname");
      const fmcName = fmcManaged
        ? (fmcPicked === "Other" ? (v("f-fmcother").trim() || null) : (fmcPicked || null))
        : null;
      const status = v("f-status") || "active";
      const existing = state.editingId ? getAccount(state.editingId) : null;

      const data = {
        accountName: name, segment,
        biSubCategory: segment === "B&I" ? (v("f-subcat") || null) : null,
        fmcManaged, fmcName,
        sectorLob: fmcManaged ? (v("f-sectorlob").trim() || null) : null,
        stage: Number(v("f-stage")) || 1,
        annualVolume: Number(v("f-volume")) || 0,
        status,
        nextStep: v("f-nextstep").trim(),
        nextStepDate: v("f-nextdate"),
        address:v("f-address").trim(), city:v("f-city").trim(),
        state:v("f-state").trim(), zip:v("f-zip").trim(),
        primaryContact:v("f-contact").trim(), phone:v("f-phone").trim(), email:v("f-email").trim(),
      };

      // Auto-stamp won/lost dates the first time they happen.
      if (data.stage === 5) data.wonDate = (existing && existing.wonDate) ? existing.wonDate : todayStr();
      if (status === "lost") {
        data.lostReason = v("f-lostreason").trim() || null;
        data.lostDate = (existing && existing.lostDate) ? existing.lostDate : todayStr();
      } else { data.lostReason = null; data.lostDate = null; }

      // A stage change counts as an interaction — reset the "needs updating" clock.
      if (existing && data.stage !== existing.stage) data.lastTouch = todayStr();

      // Owner: a manager assigns via the picker; a rep always owns their own.
      // Included on edits too, so a manager can reassign an account to a rep.
      data.ownerId = isManager() ? document.getElementById("f-owner").value : currentUser.id;

      if (state.editingId) {
        const ok = await updateAccount(state.editingId, data);
        if (!ok) return;                        // error already shown; stay on the form
        state.selectedId = state.editingId; state.view = "detail";
      } else {
        data.lastTouch = todayStr();
        const saved = await addAccount(data);
        if (!saved) return;
        state.view = "list";
      }
      state.editingId = null;
      render();
    }

    async function addNote(id) {
      const input = document.getElementById("note-input");
      const text = input ? input.value.trim() : "";
      if (!text) return;
      const today = todayStr();
      // 1. Save the note to its own table.
      const { data, error } = await sb.from("account_activity")
        .insert({ account_id:id, note:text, logged_at:today, author_id:currentUser.id })
        .select().single();
      if (error) { alert("Couldn't save note: " + error.message); return; }
      // 2. A note counts as a touch — reset the account's "needs updating" clock.
      await sb.from("accounts").update({ last_touch:today }).eq("id", id);
      // 3. Mirror both changes into the cache so the screen matches.
      const a = getAccount(id);
      if (a) { a.activity.push({ id:data.id, date:data.logged_at, text:data.note }); a.lastTouch = today; }
      render();
    }

    // Compact one-line summaries of what was executed on a call.
    function callExecSummary(ex) {
      if (!ex) return "";
      const parts = [];
      const cold = (ex.coldEquipment || []).filter(x => x && x.item);
      if (cold.length) parts.push('<div class="exec-line"><span class="exec-tag">Cold equip</span> '
        + cold.map(x => esc(x.item) + (x.qty ? ' ×'+x.qty : '')).join(' · ') + '</div>');
      const skus = (ex.newSkus || []).filter(x => x && x.sku);
      if (skus.length) parts.push('<div class="exec-line"><span class="exec-tag">New SKUs</span> '
        + skus.map(x => esc(x.sku) + (x.qty ? ' ×'+x.qty : '')).join(' · ') + '</div>');
      const act = ex.activation;
      if (act && (act.type || act.notes)) parts.push('<div class="exec-line"><span class="exec-tag">'
        + esc(act.type || 'Activation') + '</span> ' + esc(act.notes || '') + '</div>');
      return parts.join("");
    }

        + '<div class="exec-block"><label class="exec-check"><input type="checkbox" id="cl-act-done"'+(d.actDone?' checked':'')+'> Ran an activation or sampling</label>'
        +   actFields + '</div>'

    // Pull the free-text fields out of the open form into the draft, so adding or
    // removing an execution row (which re-renders) doesn't wipe what's typed.
    function syncCallLogDraft() {
      const d = state.callLog;
      const get = id => { const el = document.getElementById(id); return el ? el.value : undefined; };
      const t  = get("cl-type");     if (t  !== undefined) d.type = t;
      const n  = get("cl-note");     if (n  !== undefined) d.note = n;
      const at = get("cl-act-type"); if (at !== undefined) d.actType = at;
      const an = get("cl-act-note"); if (an !== undefined) d.actNote = an;
      const cb = document.getElementById("cl-act-done"); if (cb) d.actDone = cb.checked;
    }
    // Read the "add row" inputs, commit a row to the draft, then re-render.
    function addExecRow(kind) {
      syncCallLogDraft();
      if (kind === "cold") {
        const item = (document.getElementById("cl-cold-item").value || "").trim();
        const qty  = Number(document.getElementById("cl-cold-qty").value) || 0;
        if (item) state.callLog.cold.push({ item, qty });
      } else {
        const sku = (document.getElementById("cl-sku-name").value || "").trim();
        const qty = Number(document.getElementById("cl-sku-qty").value) || 0;
        if (sku) state.callLog.skus.push({ sku, qty });
      }
      render();
    }

    async function saveCallLog() {
      syncCallLogDraft();
      const d = state.callLog;
      const note = (d.note || "").trim();
      // Require at least something meaningful.
      if (!note && !d.type && !d.cold.length && !d.skus.length && !d.actDone) {
        document.getElementById("cl-msg").textContent = "Add a note or some execution detail before saving.";
        return;
      }
      const execution = {
        coldEquipment: d.cold,
        newSkus: d.skus,
        activation: d.actDone ? { type:d.actType, notes:(d.actNote || "").trim() } : null,
      };
      const today = todayStr();
      const id = state.callLogCpId;
      const { data, error } = await sb.from("call_logs")
        .insert({ call_point_id:id, note, call_type:d.type || null, execution, logged_at:today, author_id:currentUser.id })
        .select().single();
      if (error) { document.getElementById("cl-msg").textContent = "Couldn't save: " + error.message; return; }
      // Logging a call resets the call point's 4-week "needs a call" clock.
      await sb.from("call_points").update({ last_call:today }).eq("id", id);
      const c = getCallPoint(id);
      if (c) {
        c.calls.push({ id:data.id, date:data.logged_at, note:data.note,
                       callType:data.call_type||"", execution:data.execution||{} });
        c.lastCall = today;
      }
      state.callLog = emptyCallLog();
      state.view = "cp-detail";
      render();
    }
