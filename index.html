    // ===== PHOTOS (Supabase Storage) =========================================
    // Shrink an image in the browser before upload so files stay small (~200 KB)
    // rather than multi-megabyte phone originals. Draws the photo onto a canvas
    // at reduced size and hands back a JPEG blob.
    function resizeImage(file, maxDim = 1280, quality = 0.82) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = () => {
          const img = new Image();
          img.onerror = reject;
          img.onload = () => {
            let { width, height } = img;
            if (Math.max(width, height) > maxDim) {
              const scale = maxDim / Math.max(width, height);
              width = Math.round(width * scale); height = Math.round(height * scale);
            }
            const canvas = document.createElement("canvas");
            canvas.width = width; canvas.height = height;
            canvas.getContext("2d").drawImage(img, 0, 0, width, height);
            canvas.toBlob(b => b ? resolve(b) : reject(new Error("processing failed")), "image/jpeg", quality);
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }
    // Upload one resized blob to the photos bucket; returns the {id,path,url}
    // record we store on the row, or null on failure.
    async function uploadPhoto(folder, ownerId, blob) {
      const photoId = "ph_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
      const path = folder + "/" + ownerId + "/" + photoId + ".jpg";
      const { error } = await sb.storage.from("photos").upload(path, blob, { contentType:"image/jpeg" });
      if (error) { alert("Couldn't upload photo: " + error.message); return null; }
      const url = sb.storage.from("photos").getPublicUrl(path).data.publicUrl;
      return { id:photoId, path, url };
    }
    // Resize + upload each picked file, then persist the combined list via the
    // record's own update function (passed in as `save`).
    async function attachPhotos(files, current, folder, ownerId, save) {
      const added = [];
      for (const file of files) {
        const blob = await resizeImage(file).catch(() => null);
        if (!blob) { alert("Couldn't process one of the images."); continue; }
        const photo = await uploadPhoto(folder, ownerId, blob);
        if (photo) added.push(photo);
      }
      if (!added.length) return;
      await save([...current, ...added]);
      render();
    }

    app.addEventListener("change", (e) => {
      const id = e.target.id;
      if (id === "avatar-input") {
        const file = (e.target.files || [])[0];
        if (!file) return;
        (async () => {
          const blob = await resizeImage(file, 512, 0.85).catch(() => null);  // smaller — it's a thumbnail
          if (!blob) { alert("Couldn't process that image."); return; }
          // Clear any previous avatar, then upload fresh. We avoid `upsert` here:
          // it compiles to an "insert-or-update" that needs a read policy we
          // don't grant. A plain delete-then-insert uses the same permissions
          // your account photos already use, so it just works.
          const path = "avatars/" + currentUser.id + ".jpg";
          await sb.storage.from("photos").remove([path]);
          const { error } = await sb.storage.from("photos").upload(path, blob, { contentType:"image/jpeg" });
          if (error) { alert("Couldn't upload avatar: " + error.message); return; }
          // The path is fixed, so add a timestamp to the URL to dodge the cache.
          const url = sb.storage.from("photos").getPublicUrl(path).data.publicUrl + "?t=" + Date.now();
          const { error: saveErr } = await sb.from("profiles").update({ avatar_url: url }).eq("id", currentUser.id);
          if (saveErr) { alert("Couldn't save avatar: " + saveErr.message); return; }
          currentUser.avatarUrl = url;
          const me = personById(currentUser.id); if (me) me.avatarUrl = url;
          render();
        })();

      if (id === "cpf-region")  { state.cpRegion  = e.target.value; renderCpResults(); }
      if (id === "cpf-owner")   { state.cpOwner   = e.target.value; renderCpResults(); }
      if (id === "f-segment")   document.getElementById("field-subcat").classList.toggle("hidden", e.target.value !== "B&I");
      if (id === "f-fmc")     { const hide = e.target.value !== "yes";
                                document.getElementById("field-fmcname").classList.toggle("hidden", hide);
                                document.getElementById("field-sectorlob").classList.toggle("hidden", hide);
                                const isOther = document.getElementById("f-fmcname").value === "Other";
                                document.getElementById("field-fmcother").classList.toggle("hidden", hide || !isOther); }
      if (id === "f-fmcname")   document.getElementById("field-fmcother").classList.toggle("hidden", e.target.value !== "Other");
      if (id === "f-status")    document.getElementById("field-lostreason").classList.toggle("hidden", e.target.value !== "lost");
      if (id === "photo-input") {
        const acct = getAccount(state.selectedId);
        if (!acct) return;
        const files = Array.from(e.target.files || []);
        if (files.length) attachPhotos(files, acct.photos, "accounts", acct.id, arr => updateAccount(acct.id, { photos:arr }));
      }
      if (id === "cp-fmc")    { const hide = e.target.value !== "yes";
                                document.getElementById("cp-field-fmcname").classList.toggle("hidden", hide);
                                document.getElementById("cp-field-sectorlob").classList.toggle("hidden", hide);

      }

    // ---- One-time "Add to Home Screen" hint (iOS Safari only) ---------------
    function isIosSafari() {
      const ua = navigator.userAgent || "";
      const iOS = /iphone|ipad|ipod/i.test(ua) ||
                  (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1); // iPadOS
      const otherBrowser = /CriOS|FxiOS|EdgiOS|OPiOS|mercury/i.test(ua); // Chrome/FF/Edge/Opera on iOS
      return iOS && /WebKit/i.test(ua) && !otherBrowser;
    }
    function isStandalone() {
      return window.navigator.standalone === true ||
             (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches);
    }
    function maybeShowA2HS() {
      // Skip unless we're in iOS Safari, not already installed, and not dismissed before.
      if (!isIosSafari() || isStandalone()) return;
      try { if (localStorage.getItem("ram_a2hs_dismissed") === "1") return; } catch (e) {}
      if (document.getElementById("a2hs-hint")) return;

      const share = '<svg class="a2hs-share" viewBox="0 0 24 24" fill="none" stroke="currentColor" '
        + 'stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'
        + '<path d="M12 16V4M8 8l4-4 4 4"/><path d="M6 12v7a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-7"/></svg>';
      const el = document.createElement("div");
      el.id = "a2hs-hint";
      el.className = "a2hs";
      el.innerHTML =
          '<button class="a2hs-x" aria-label="Dismiss">×</button>'
        + '<div class="a2hs-body">'
        +   '<img src="apple-touch-icon.png" class="a2hs-icon" alt="" onerror="this.style.display=\'none\'" />'
        +   '<div class="a2hs-text"><b>Add RAM to your Home Screen</b>'
        +     '<span>Tap '+share+' Share below, then <b>Add to Home Screen</b>.</span></div>'
        + '</div>'
        + '<div class="a2hs-arrow"></div>';
      document.body.appendChild(el);

      el.querySelector(".a2hs-x").addEventListener("click", () => {
        try { localStorage.setItem("ram_a2hs_dismissed", "1"); } catch (e) {}
        el.classList.remove("show");
        setTimeout(() => el.remove(), 280);
      });
      requestAnimationFrame(() => el.classList.add("show"));
    }

    boot();
    setTimeout(maybeShowA2HS, 1200);
  </script>
</body>
</html>
